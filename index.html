<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>画像タグ管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h2>画像タグ管理</h2>
<input id="search" placeholder="タグ検索">
</header>

<main>
<div id="stats"></div>
<div id="gallery"></div>
</main>

<button id="fab">＋</button>

<dialog id="detailDialog">
  <img id="detailImg">

  <p id="createdAt"></p>

  <div id="tagView"></div>

  <textarea id="editTags" style="display:none;"></textarea>

  <div class="actions">
    <button id="editBtn">タグ編集</button>
    <button id="updateBtn" style="display:none;">保存</button>
    <button id="deleteBtn">削除</button>
    <button id="closeDetail">閉じる</button>
  </div>
</dialog>

<script src="script.js"></script>
</body>
</html>
