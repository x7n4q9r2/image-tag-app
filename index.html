<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>画像タグ管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h2>画像タグ管理</h2>
<input id="search" placeholder="タグ検索">
</header>

<main>
<div id="stats"></div>
<div id="gallery"></div>
</main>

<button id="fab">＋</button>

<dialog id="uploadDialog">
<h3>画像登録</h3>
<input type="file" id="imageInput" accept="image/*"><br><br>
<input type="text" id="tagInput" placeholder="タグをスペース区切りで入力">
<div class="tagHints" id="tagHints"></div>
<div class="actions">
<button id="closeUpload">閉じる</button>
</div>
</dialog>

<dialog id="detailDialog">
<img id="detailImg">
<p id="createdAt"></p>
<textarea id="editTags"></textarea>
<div class="actions">
<button id="updateBtn">タグ更新</button>
<button id="deleteBtn">削除</button>
<button id="closeDetail">閉じる</button>
</div>
</dialog>

<script src="script.js"></script>
</body>
</html>
